<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Rating</title>

<style>

body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#111;
    color:#c6c6c6;
}

header{
    background:#3f0000;
    color:white;
    padding:1rem;
    text-align:center;
}

.container{
    max-width:1200px;
    margin:2rem auto;
    padding:1rem;
}

.recommendation-form{
    background:#202020;
    padding:1rem;
    border-radius:8px;
    margin-bottom:2rem;
}

.recommendation-form input,
.recommendation-form textarea,
.recommendation-form button{
    width:100%;
    margin-bottom:1rem;
    padding:0.5rem;
    border-radius:4px;
    border:1px solid #ccc;
}

.recommendation-form label{
    font-weight:bold;
}

.stars{
    display:flex;
    gap:5px;
    margin-bottom:1rem;
}

.stars span{
    font-size:1.5rem;
    cursor:pointer;
    color:#ccc;
}

.stars span.selected{
    color:gold;
}

.padlet{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:1rem;
}

.padlet-item{
    background:white;
    color:#111;
    padding:1rem;
    border-radius:8px;
}

.padlet-item .rating{
    color:gold;
}

.padlet-item .user{
    font-size:0.9rem;
    color:#820000;
    font-weight:bold;
}

.delete-btn{
    margin-top:8px;
    padding:6px;
    border:none;
    background:#b30000;
    color:white;
    border-radius:4px;
    cursor:pointer;
}

footer{
    text-align:center;
    padding:1rem;
    background:#3f0000;
    color:white;
    position:fixed;
    bottom:0;
    width:100%;
}

</style>
</head>

<body>

<header>
<h1>Movie Rating</h1>
</header>

<div class="container">

<div class="recommendation-form">

<h2>Add Your Rating!</h2>

<form id="recommendationForm">

<label>Your Name:</label>
<input type="text" id="userName" required>

<label>Movie Name, Year and Genre:</label>
<input type="text" id="movieName" required>

<label>Rating:</label>

<div class="stars" id="stars">
<span data-value="1">★</span>
<span data-value="2">★</span>
<span data-value="3">★</span>
<span data-value="4">★</span>
<span data-value="5">★</span>
</div>

<button type="submit">Submit</button>

</form>

</div>

<div class="padlet" id="padlet"></div>

</div>

<script>

const stars=document.querySelectorAll(".stars span");
let selectedRating=0;

stars.forEach((star,index)=>{
    star.addEventListener("click",()=>{
        selectedRating=index+1;
        updateStars();
    });
});

function updateStars(){
    stars.forEach((star,index)=>{
        star.classList.toggle("selected",index<selectedRating);
    });
}

const form=document.getElementById("recommendationForm");
const padlet=document.getElementById("padlet");

let movies={};

form.addEventListener("submit",(e)=>{

    e.preventDefault();

    const userName=document.getElementById("userName").value;
    const movieName=document.getElementById("movieName").value;


    if(selectedRating===0){
        alert("Please select a rating!");
        return;
    }

    if(movies[movieName]){

        let movie=movies[movieName];

        movie.rating=(movie.rating+selectedRating)/2;

        movie.count+=1;

        movie.element.querySelector(".rating").innerHTML=
        "★".repeat(Math.round(movie.rating))+
        "☆".repeat(5-Math.round(movie.rating));

        movie.element.querySelector(".user").innerText=
        "🎬 "+userName+" updated rating:";

    }

    else{

        const padletItem=document.createElement("div");
        padletItem.classList.add("padlet-item");

        padletItem.innerHTML=`
        <p class="user">🎬 ${userName} rates:</p>
        <h3>${movieName}</h3>
        <p class="rating">${"★".repeat(selectedRating)}${"☆".repeat(5-selectedRating)}</p>
        <button class="delete-btn">Delete</button>
        `;

        const deleteBtn=padletItem.querySelector(".delete-btn");

        deleteBtn.addEventListener("click",()=>{

            if(confirm("Are you sure you want to delete?")){
                padletItem.remove();
                delete movies[movieName];
            }

        });

        padlet.prepend(padletItem);

        movies[movieName]={
            rating:selectedRating,
            count:1,
            element:padletItem
        };

    }

    form.reset();
    selectedRating=0;
    updateStars();

});

</script>

</body>
</html>
